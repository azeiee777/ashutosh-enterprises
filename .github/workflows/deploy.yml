name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, xml, ctype, json, zip

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies & Build Assets
        run: |
          npm install
          npm run build

      - name: Deploy to Hostinger using Rsync
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass rsync
          sshpass -p "${{ secrets.HOST_PASSWORD }}" rsync -rltgoDzvO \
            --exclude="/node_modules/" \
            --exclude="/.git/" \
            --exclude="/.github/" \
            --exclude="/.env" \
            --exclude="/tests/" \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOST_PORT }}" \
            ./ ${{ secrets.HOST_USERNAME }}@${{ secrets.HOST_IP }}:${{ secrets.HOST_PATH }}

      - name: Execute Post-Deployment Scripts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USERNAME }}
          password: ${{ secrets.HOST_PASSWORD }}
          port: ${{ secrets.HOST_PORT }}
          script: |
            cd ${{ secrets.HOST_PATH }}
            
            # Ensure storage has correct permissions (Hostinger shared hosting usually handles this, but just in case)
            chmod -R 775 storage bootstrap/cache || true
            
            # Run Laravel optimizations
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Run migrations automatically
            php artisan migrate --force || echo "Migration failed, please check database connection"
